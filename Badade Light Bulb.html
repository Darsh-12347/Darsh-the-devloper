<html>
<head>
  <title>Light Bulb Toggle</title>
  <style>
    body {
      background-color: #e0f7fa;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
    }

    h1 {
      color: #333;
    }

    img {
      width: 100px;
      height: auto;
      margin: 20px;
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .on-btn {
      background-color: #4caf50;
      color: white;
      border: none;
    }

    .off-btn {
      background-color: #f44336;
      color: white;
      border: none;
    }
  </style>
</head>
<body>

  <h1>💡 Light ON / OFF Bulb</h1>
  <img id="bulb" src="https://www.shutterstock.com/image-illustration/light-bulb-2d-illustration-260nw-155105231.jpg" alt="Light Bulb">
  <br>
  <button class="on-btn" onclick="turnOn()">ON</button>
  <button class="off-btn" onclick="turnOff()">OFF</button>

  <script>
    function turnOn() {
      document.getElementById('bulb').src = "https://www.w3schools.com/js/pic_bulbon.gif";
    }

    function turnOff() {
      document.getElementById('bulb').src = "https://www.w3schools.com/js/pic_bulboff.gif";
    }
  </script>

</body>
</html>
